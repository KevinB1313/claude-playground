<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f5f0;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 20px 64px;
    }

    .page-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.5rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .page-subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 36px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 380px;
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.2s ease;
    }

    .card.loading { opacity: 0.45; pointer-events: none; }

    .pokemon-id {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 4px;
      font-family: 'Courier New', monospace;
    }

    .pokemon-sprite-wrap {
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 0 12px;
    }

    .pokemon-sprite {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .loading-sprite {
      width: 80px;
      height: 80px;
      border: 3px solid #e8e4dc;
      border-top-color: #c9b99a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pokemon-name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 12px;
      text-align: center;
    }

    .type-badges {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .type-badge {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0ece4;
      margin: 4px 0 20px;
    }

    .info-row {
      display: flex;
      gap: 32px;
      margin-bottom: 20px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .info-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
    }

    .info-value {
      font-size: 1.05rem;
      color: #333;
    }

    .stats-section {
      width: 100%;
    }

    .stats-title {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 12px;
      text-align: center;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 68px 36px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .stat-name {
      font-size: 0.72rem;
      color: #999;
      text-align: right;
      letter-spacing: 0.04em;
    }

    .stat-val {
      font-size: 0.85rem;
      color: #333;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .stat-bar-track {
      height: 6px;
      background: #f0ece4;
      border-radius: 99px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #2c2c2c;
      color: #fff;
    }

    .btn-primary:hover { background: #444; }

    .btn-secondary {
      background: #fff;
      color: #555;
      border: 1px solid #e0dbd2;
    }

    .btn-secondary:hover { background: #fdfbf7; }

    .error-msg {
      color: #b94a48;
      font-size: 0.9rem;
      text-align: center;
      padding: 16px 0 8px;
    }

    /* type colors */
    .type-normal   { background: #9FA19F; }
    .type-fire     { background: #E62829; }
    .type-water    { background: #2980EF; }
    .type-electric { background: #FAC000; color: #333; }
    .type-grass    { background: #3FA129; }
    .type-ice      { background: #3DCEF3; color: #333; }
    .type-fighting { background: #FF8000; }
    .type-poison   { background: #9141CB; }
    .type-ground   { background: #915121; }
    .type-flying   { background: #81B9EF; color: #333; }
    .type-psychic  { background: #EF4179; }
    .type-bug      { background: #91A119; }
    .type-rock     { background: #AFA981; color: #333; }
    .type-ghost    { background: #704170; }
    .type-dragon   { background: #5060E1; }
    .type-dark     { background: #624D4E; }
    .type-steel    { background: #60A1B8; }
    .type-fairy    { background: #EF70EF; }
  </style>
</head>
<body>

  <h1 class="page-title">Pokémon Explorer</h1>
  <p class="page-subtitle">Original 151</p>

  <div class="card" id="card">
    <div class="pokemon-id" id="pokemon-id"></div>
    <div class="pokemon-sprite-wrap" id="sprite-wrap">
      <div class="loading-sprite"></div>
    </div>
    <div class="pokemon-name" id="pokemon-name">Loading…</div>
    <div class="type-badges" id="type-badges"></div>
    <div class="divider"></div>
    <div class="info-row" id="info-row" style="display:none">
      <div class="info-item">
        <span class="info-label">Height</span>
        <span class="info-value" id="pokemon-height">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Weight</span>
        <span class="info-value" id="pokemon-weight">—</span>
      </div>
    </div>
    <div class="stats-section" id="stats-section" style="display:none">
      <div class="stats-title">Base Stats</div>
      <div id="stats-list"></div>
    </div>
    <div class="error-msg" id="error-msg" style="display:none"></div>
  </div>

  <div class="buttons">
    <button class="btn-primary" id="btn-random">🎲 Random Pokémon</button>
    <button class="btn-secondary" id="btn-another">Try another</button>
  </div>

  <script>
    const STAT_LABELS = {
      'hp':              'HP',
      'attack':          'Attack',
      'defense':         'Defense',
      'special-attack':  'Sp. Atk',
      'special-defense': 'Sp. Def',
      'speed':           'Speed',
    };

    const STAT_COLORS = {
      'hp':              '#FF5959',
      'attack':          '#F5AC78',
      'defense':         '#FAE078',
      'special-attack':  '#9DB7F5',
      'special-defense': '#A7DB8D',
      'speed':           '#FA92B2',
    };

    const card       = document.getElementById('card');
    const idEl       = document.getElementById('pokemon-id');
    const spriteWrap = document.getElementById('sprite-wrap');
    const nameEl     = document.getElementById('pokemon-name');
    const badgesEl   = document.getElementById('type-badges');
    const infoRow    = document.getElementById('info-row');
    const heightEl   = document.getElementById('pokemon-height');
    const weightEl   = document.getElementById('pokemon-weight');
    const statsSection = document.getElementById('stats-section');
    const statsList  = document.getElementById('stats-list');
    const errorMsg   = document.getElementById('error-msg');

    function titleCase(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function formatId(id) {
      return '#' + String(id).padStart(3, '0');
    }

    function setLoading() {
      card.classList.add('loading');
      spriteWrap.innerHTML = '<div class="loading-sprite"></div>';
      nameEl.textContent = 'Loading…';
      idEl.textContent = '';
      badgesEl.innerHTML = '';
      infoRow.style.display = 'none';
      statsSection.style.display = 'none';
      errorMsg.style.display = 'none';
    }

    function showError(msg) {
      card.classList.remove('loading');
      spriteWrap.innerHTML = '<div style="font-size:3rem;line-height:160px">😵</div>';
      nameEl.textContent = '';
      idEl.textContent = '';
      badgesEl.innerHTML = '';
      infoRow.style.display = 'none';
      statsSection.style.display = 'none';
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function renderPokemon(data) {
      idEl.textContent = formatId(data.id);

      const spriteUrl = data.sprites.front_default;
      if (spriteUrl) {
        const img = document.createElement('img');
        img.className = 'pokemon-sprite';
        img.src = spriteUrl;
        img.alt = data.name;
        spriteWrap.innerHTML = '';
        spriteWrap.appendChild(img);
      } else {
        spriteWrap.innerHTML = '<div style="font-size:3rem;line-height:160px">❓</div>';
      }

      nameEl.textContent = titleCase(data.name);

      badgesEl.innerHTML = '';
      data.types.forEach(function (t) {
        const badge = document.createElement('span');
        badge.className = 'type-badge type-' + t.type.name;
        badge.textContent = titleCase(t.type.name);
        badgesEl.appendChild(badge);
      });

      heightEl.textContent = (data.height / 10).toFixed(1) + 'm';
      weightEl.textContent = (data.weight / 10).toFixed(1) + 'kg';
      infoRow.style.display = 'flex';

      statsList.innerHTML = '';
      data.stats.forEach(function (s) {
        const key   = s.stat.name;
        const label = STAT_LABELS[key] || titleCase(key);
        const val   = s.base_stat;
        const pct   = Math.min(100, Math.round((val / 255) * 100));
        const color = STAT_COLORS[key] || '#c9b99a';

        const row = document.createElement('div');
        row.className = 'stat-row';
        row.innerHTML =
          '<span class="stat-name">' + label + '</span>' +
          '<span class="stat-val">' + val + '</span>' +
          '<div class="stat-bar-track">' +
            '<div class="stat-bar-fill" style="width:0%;background:' + color + '"></div>' +
          '</div>';
        statsList.appendChild(row);

        // animate bar in after a tick
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            row.querySelector('.stat-bar-fill').style.width = pct + '%';
          });
        });
      });
      statsSection.style.display = 'block';

      errorMsg.style.display = 'none';
      card.classList.remove('loading');
    }

    function fetchRandom() {
      setLoading();
      const id = Math.floor(Math.random() * 151) + 1;
      fetch('https://pokeapi.co/api/v2/pokemon/' + id)
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(renderPokemon)
        .catch(function () {
          showError("Couldn't load Pokémon, try again.");
        });
    }

    document.getElementById('btn-random').addEventListener('click', fetchRandom);
    document.getElementById('btn-another').addEventListener('click', fetchRandom);

    fetchRandom();
  </script>
</body>
</html>
